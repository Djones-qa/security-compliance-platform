version: "3.9"

services:
  # Open Policy Agent
  opa:
    image: openpolicyagent/opa:0.59.0-rootless
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-format=json
      - --set=decision_logs.console=true
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./policies/kubernetes:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - security-net

  # HashiCorp Vault (dev mode)
  vault:
    image: hashicorp/vault:1.15.4
    command: vault server -dev -dev-root-token-id=root -dev-listen-address=0.0.0.0:8200
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_DEV_ROOT_TOKEN_ID: root
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - security-net

  # Policy API service
  policy-api:
    build:
      context: ./services/policy-api
      dockerfile: Dockerfile
      target: production
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      OPA_URL: http://opa:8181
      OPA_POLICY_PATH: /v1/data/kubernetes/admission
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      FAIL_OPEN: "false"
      LOG_LEVEL: debug
    depends_on:
      opa:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - security-net

  # Compliance Reporter service
  compliance-reporter:
    build:
      context: ./services/compliance-reporter
      dockerfile: Dockerfile
      target: production
    ports:
      - "8090:8090"
    environment:
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      LOG_LEVEL: debug
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - security-net

  # Mock admission webhook target (nginx for testing)
  mock-target:
    image: nginx:1.25-alpine
    ports:
      - "9090:80"
    networks:
      - security-net

networks:
  security-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
