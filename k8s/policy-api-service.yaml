apiVersion: v1
kind: Service
metadata:
  name: policy-api
  namespace: security-platform
  labels:
    app: policy-api
    version: v1.0.0
    team: platform
spec:
  selector:
    app: policy-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
# Admission webhook configuration (ValidatingWebhookConfiguration)
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: security-platform-admission
  labels:
    app: policy-api
    team: platform
webhooks:
  - name: policy-api.security-platform.svc
    clientConfig:
      service:
        name: policy-api
        namespace: security-platform
        path: /admission/validate
      caBundle: ""  # Set by cert-manager or manual TLS setup
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
    failurePolicy: Fail
    matchPolicy: Equivalent
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 10
