apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-reporter
  namespace: security-platform
  labels:
    app: compliance-reporter
    version: v1.0.0
    team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compliance-reporter
  template:
    metadata:
      labels:
        app: compliance-reporter
        version: v1.0.0
        team: platform
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "compliance-reporter"
    spec:
      serviceAccountName: compliance-reporter-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compliance-reporter
          image: compliance-reporter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
